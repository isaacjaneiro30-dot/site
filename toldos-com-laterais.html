    <script src="js/script.js"></script>
    
    <script>
        let slideIndex = 1;
        const slideNames = ['Paneles', 'Activa', 'Venecia', 'Dynamic', 'Nomad'];
        
        function currentSlide(n) {
            showSlides(slideIndex = n);
        }
        
        function showSlides(n) {
            let slides = document.getElementsByClassName("carousel-image");
            let dots = document.getElementsByClassName("carousel-dot");
            let title = document.getElementById("carousel-title");
            
            if (n > slides.length) {slideIndex = 1}
            if (n < 1) {slideIndex = slides.length}
            
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");
            }
            
            for (let i = 0; i < dots.length; i++) {
                dots[i].classList.remove("active");
            }
            
            slides[slideIndex-1].classList.add("active");
            dots[slideIndex-1].classList.add("active");
            title.textContent = slideNames[slideIndex-1];
        }
        
        // Auto slide
        function nextSlide() {
            slideIndex++;
            if (slideIndex > 5) slideIndex = 1;
            showSlides(slideIndex);
        }
        
        // Auto advance every 3 seconds
        setInterval(nextSlide, 3000);
    </script>
